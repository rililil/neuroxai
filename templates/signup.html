<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - NeuroXAI Care</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Google Fonts for Medical Professionalism -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

    <header class="main-header">
        <div class="header-container">
            <img src="{{ url_for('static', filename='L.PNG') }}" alt="NeuroXAI Logo" class="brand-logo">
            <button class="mode-toggle" id="theme-toggle" aria-label="Toggle Dark Mode">
                <span class="icon">🌙</span>
            </button>
        </div>
    </header>

    <main class="auth-container">
        <section class="auth-card">
            <div class="auth-header">
                <h2>Create Medical Account</h2>
                <p>Register to start using our neurological diagnostic tools</p>
            </div>

            <form method="POST" action="/signup" class="modern-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="doctor@hospital.com" required>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="e.g. DrSmith" required>
                </div>

                <div class="form-group"> <label for="phone">Phone Number</label> 
                    <input type="tel" id="phone" name="phone" placeholder="e.g. +966501234567" required> 
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a strong password" required>
                </div>

                {% if error %}
                <div class="error-message">
                    <span class="error-icon">⚠️</span>
                    <p>{{ error }}</p>
                </div>
                {% endif %}

                <button type="submit" class="btn-primary">Create Account</button>
            </form>

            <div class="auth-footer-links">
                <p>Already have an account? <a href="/login">Sign in here</a></p>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <div class="contact-info">
                <h3>Contact Support:</h3>
                <a href="mailto:support@neuroxai.care" class="contact-link">
                    <span>support@neuroxai.care</span>
                </a>
            </div>
            <p class="copyright">&copy; 2026 NeuroXAI Care. Precision Neurological Analytics.</p>
        </div>
    </footer>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const body = document.body;

        function updateToggleIcon(isDark) {
            const icon = themeToggle.querySelector('.icon');
            if (icon) icon.textContent = isDark ? "☀️" : "🌙";
        }

        function toggleMode() {
            body.classList.toggle("dark-mode");
            const isDark = body.classList.contains("dark-mode");
            localStorage.setItem("theme", isDark ? "dark" : "light");
            updateToggleIcon(isDark);
        }

        themeToggle.addEventListener('click', toggleMode);

        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem("theme");
            if (savedTheme === "dark") {
                body.classList.add("dark-mode");
                updateToggleIcon(true);
            }
        });
    </script>
</body>
</html>
